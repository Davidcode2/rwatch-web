apiVersion: apps/v1
kind: Deployment
metadata:
  name: rwatch-web
  namespace: rwatch-web
  labels:
    app: rwatch-web
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rwatch-web
  template:
    metadata:
      labels:
        app: rwatch-web
    spec:
      containers:
        - name: web
          image: ghcr.io/davidcode2/rwatch-web-web:main
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: RWATCH_AGENT_SERVICE_HOST
              value: "rwatch-agent.rwatch"
            - name: RWATCH_AGENT_SERVICE_PORT
              value: "3000"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
