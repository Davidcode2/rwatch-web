name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr
  IMAGE_NAME: ${{ github.repository }}-web
  APP_REPO_NAME: rwatch-web
  APP_OF_APPS_REPO: app-of-apps
  DEPLOYMENT_DIR: rwatch-web
  DEPLOYMENT_FILE: 02-deployment.yaml
  GITHUB_OWNER: Davidcode2

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bump patch version in package.json
        id: bump
        run: |
          # Extract current version
          CURRENT=$(grep '"version"' package.json | head -1 | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "Current version: $CURRENT"
          
          # Split version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          
          # Update version using sed
          sed -i "s/\"version\": \"${CURRENT}\"/\"version\": \"${NEW_VERSION}\"/" package.json
          
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped version: $CURRENT → $NEW_VERSION"

      - name: Commit and push version bump
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: bump-version
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.bump-version.outputs.version }}
            type=sha,enable=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [bump-version, build]
    if: github.event_name != 'pull_request'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ env.GITHUB_OWNER }}
          repositories: ${{ env.APP_OF_APPS_REPO }}

      - name: Checkout app-of-apps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITHUB_OWNER }}/${{ env.APP_OF_APPS_REPO }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Update deployment image tag
        working-directory: ${{ env.DEPLOYMENT_DIR }}
        run: |
          VERSION=${{ needs.bump-version.outputs.version }}
          OWNER_LC=$(echo "${{ env.GITHUB_OWNER }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ env.APP_REPO_NAME }}" | tr '[:upper:]' '[:lower:]')
          sed -i "s|image: ghcr.io/${OWNER_LC}/${REPO_LC}-web:.*|image: ghcr.io/${OWNER_LC}/${REPO_LC}-web:${VERSION}|g" ${{ env.DEPLOYMENT_FILE }}
          echo "Updated image tag to ${VERSION}"

      - name: Commit and push deployment update
        working-directory: ${{ env.DEPLOYMENT_DIR }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --exit-code && echo "No changes to commit" && exit 0
          git add .
          git commit -m "deploy: ${{ env.APP_REPO_NAME }} v${VERSION}"
          git push
